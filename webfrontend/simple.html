<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce Order Queue</title>
  <style>
    body { font-family: sans-serif; background: #f9f9f9; }
    .container { max-width: 500px; margin: 2rem auto; padding: 2rem; border-radius: 8px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    input, select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { background: #aaa; }
    .result, .error { margin-top: 2rem; padding: 1rem; border-radius: 4px; background: #f1f1f1; }
    .error { border: 1px solid #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ecommerce Order Queue</h1>
    <form id="orderForm">
      <label>
        Product Link:
        <input id="url" type="url" required placeholder="Paste product URL here" />
      </label>
      <label>
        Task:
        <select id="task">
          <option value="order">Order</option>
          <option value="add_to_cart">Add to Cart</option>
        </select>
      </label>
      <label>
        Delivery Address:
        <input id="delivery_address" type="text" placeholder="Optional" />
      </label>
      <label>
        Payment Method:
        <input id="payment_method" type="text" placeholder="Optional" />
      </label>
      <button type="submit" id="submitBtn">Queue Order</button>
    </form>
    <div id="loading" style="display:none;">Processing...</div>
    <div id="result" class="result" style="display:none;"></div>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script>
    const form = document.getElementById('orderForm');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const error = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      loading.style.display = 'block';
      result.style.display = 'none';
      error.style.display = 'none';
      submitBtn.disabled = true;
      const payload = {
        url: document.getElementById('url').value,
        task: document.getElementById('task').value,
        delivery_address: document.getElementById('delivery_address').value || undefined,
        payment_method: document.getElementById('payment_method').value || undefined
      };
      try {
        const res = await fetch('/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          result.textContent = JSON.stringify(data, null, 2);
          result.style.display = 'block';
        } else {
          error.textContent = data.detail || 'Unknown error';
          error.style.display = 'block';
        }
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
